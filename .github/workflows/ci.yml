name: .NET Tests

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore SeleniumWebDriver/UnitTestProject3/UnitTestProject3.csproj

      - name: Build
        run: dotnet build SeleniumWebDriver/UnitTestProject3/UnitTestProject3.csproj --no-restore

      - name: Run tests
        run: dotnet test SeleniumWebDriver/UnitTestProject3/UnitTestProject3.csproj --no-build --verbosity normal
