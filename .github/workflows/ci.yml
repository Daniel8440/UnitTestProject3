steps:
  - uses: actions/checkout@v3

  - name: DEBUG
    run: ls -R

  - uses: actions/setup-dotnet@v3
    with:
      dotnet-version: 6.0.x

  - name: Restore
    working-directory: UnitTestProject3/UnitTestProject3
    run: dotnet restore

  - name: Build
    working-directory: UnitTestProject3/UnitTestProject3
    run: dotnet build --no-restore

  - name: Test
    working-directory: UnitTestProject3/UnitTestProject3
    run: dotnet test --no-build --verbosity normal
