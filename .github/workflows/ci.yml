name: .NET CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest   # 👈 КЛЮЧОВО

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      run: nuget restore "Нова папка/SeleniumWebDriver/UnitTestProject3/UnitTestProject3.slnx"

    - name: Build
      run: msbuild "Нова папка/SeleniumWebDriver/UnitTestProject3/UnitTestProject3.slnx" /p:Configuration=Release

    - name: Test
      run: vstest.console.exe "Нова папка/SeleniumWebDriver/UnitTestProject3/UnitTestProject3/bin/Release/UnitTestProject3.dll"
